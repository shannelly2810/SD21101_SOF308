<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fontawesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="#">
    <title>Bài 4 - Lab 2</title>
</head>

<body>

    <div class="container mt-3">
        <h3>Bài tập ứng dụng Modal cho Tài khoản</h3>

        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
            Tài khoản
        </button>
    </div>

    <div class="modal fade" id="myModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">ĐĂNG NHẬP / ĐĂNG KÝ</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="container mt-3">
                        <ul class="nav nav-tabs" role="tablist">
                            <li class="nav-item">
                                <a class="nav-link active" data-bs-toggle="tab" href="#register">Đăng ký</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#login">Đăng nhập</a>
                            </li>
                            <li class="nav-item">
                            </li>
                        </ul>

                        <div class="tab-content">
                            <div id="register" class="container tab-pane active"><br>
                                <h3>Form Đăng Ký Thông Tin</h3>
                                <form class="border p-4 rounded shadow-sm">
                                    <div class="mb-3">
                                        <label class="form-label">Họ và Tên</label>
                                        <input type="text" class="form-control" placeholder="Nhập họ và tên">
                                    </div>
                                    <div class="mb">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" placeholder="Nhập email">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Số Điện Thoại</label>
                                        <input type="text" class="form-control" placeholder="Nhập số điện thoại">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Mật Khẩu</label>
                                        <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Xác Nhận Mật Khẩu</label>
                                        <input type="password" class="form-control" placeholder="Xác nhận mật khẩu">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label d-block">Giới Tính:</label>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="gender" id="male"
                                                checked>
                                            <label class="form-check-label" for="male">Nam</label>
                                        </div>
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" name="gender" id="female">
                                            <label class="form-check-label" for="female">Nữ</label>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Ngôn Ngữ</label>
                                        <select class="form-select">
                                            <option selected>Tiếng Việt</option>
                                            <option value="1">English</option>
                                        </select>
                                    </div>
                                    <div class="mb-3 form-check">
                                        <input type="checkbox" class="form-check-input" id="terms">
                                        <label class="form-check-label" for="terms">Tôi đồng ý với các điều khoản và
                                            điều kiện</label>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Đăng Ký</button>
                                </form>
                            </div>

                            <div id="login" class="container tab-pane fade"><br>
                                <h3>Form Đăng nhập</h3>
                                <form class="border p-4 rounded shadow-sm">
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" placeholder="Nhập email">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Mật Khẩu</label>
                                        <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Đăng Nhập</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="#"></script>
</body>

</html>
