<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fontawesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="#">
    <title>30 - PS44042 - SOF308 Labs Manager</title>
</head>

<body>
    <div class="container-fluid mt-4">
        <div class="row">
            <aside class="col-sm-3 px-3">
                <div class="p-3 border shadow-sm bg-white rounded">
                    <h5 class="fw-bold text-info"><i class="fa-solid fa-folder-open me-2"></i>Quick Navigation</h5>
                    <div class="list-group list-group-flush small">
                        <a href="index.html" class="list-group-item list-group-item-action">Main page</a>
                        <a href="labs.html" class="list-group-item list-group-item-action active">My Labs</a>
                        <a href="assignment.html" class="list-group-item list-group-item-action">My Assignment</a>
                    </div>
                </div>
            </aside>

            <article class="col-sm-9 p-4 bg-white border rounded shadow-sm" id="main-display">

                <div id="labs-list-view">
                    <h2 class="text-info mb-4">SOF308 Lab Management</h2>
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Lab #</th>
                                <th>Topic</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Lab 01</td>
                                <td>Bootstrap basics</td>
                                <td><button class="btn btn-primary btn-sm" onclick="openLab('lab01')">View Exercises</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="exercise-list-view" style="display: none;">
                    <h3 id="lab-title" class="text-info"></h3>
                    <table class="table table-bordered mt-3">
                        <thead class="table-dark small">
                            <tr>
                                <th>Ex #</th>
                                <th>Task Description</th>
                                <th>Preview</th>
                            </tr>
                        </thead>
                        <tbody id="exercise-rows">
                        </tbody>
                    </table>
                    <button class="btn btn-secondary btn-sm" onclick="showLevel(1)">Back to Labs</button>
                </div>

                <div id="preview-view" style="display: none;">
                    <h3 id="ex-title" class="text-info"></h3>
                    <div class="ratio ratio-16x9 border shadow-sm rounded">
                        <iframe id="preview-frame" src="" allowfullscreen></iframe>
                    </div>
                    <button class="btn btn-secondary btn-sm mt-3" onclick="showLevel(2)">Back to Exercises</button>
                </div>
            </article>
        </div>
    </div>
    <script src="assets/js/labView.js"></script>
</body>

</html>
